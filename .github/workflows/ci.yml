name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension dependencies and verify package-lock
        working-directory: vscode-extension
        run: npm ci

      - name: Install Python test and release extras
        run: python -m pip install -e ".[test,release]"

      - name: Compile Python sources
        run: python -m compileall -q agent_hub scripts

      - name: Validate config reference
        run: python scripts/check_config_reference.py

      - name: Validate config migration coverage
        run: python scripts/check_config_migration_coverage.py

      - name: Prepare backend snapshot
        working-directory: vscode-extension
        run: npm run prepare-backend

      - name: Validate backend snapshot drift
        run: python scripts/validate_backend_drift.py

      - name: Validate release manifest and version metadata
        run: python scripts/validate_release.py

      - name: Run packaging pytest checks
        run: python -m pytest -m packaging

      - name: Run default Python pytest checks with coverage
        run: python -m pytest -m "not integration and not stress" --cov=agent_hub --cov-report=xml --cov-report=term-missing --durations=20

      - name: Publish coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml

      - name: Check VS Code extension syntax
        working-directory: vscode-extension
        run: npm run check

      - name: Check extension version consistency
        working-directory: vscode-extension
        run: npm run check:version

      - name: Report stale package artifacts
        working-directory: vscode-extension
        run: npm run package-clean

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package

      - name: Validate VSIX cleanliness and source package artifacts
        run: python scripts/validate_vsix_cleanliness.py --check-source

  fresh-install:
    name: Fresh Install Proof
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime package only
        run: python -m pip install -e .

      - name: Run runtime doctor
        run: agent-hub doctor

      - name: Install Python test extra
        run: python -m pip install -e ".[test]"

      - name: Run default tests from fresh install
        run: pytest -m "not integration and not stress"
