name: Manual VSIX Release

on:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: "Create/update a GitHub Release for the extension version"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

jobs:
  package-vsix:
    name: Build VSIX artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension dependencies and verify package-lock
        working-directory: vscode-extension
        run: npm ci

      - name: Stamp CI build metadata
        run: python scripts/update_release_metadata.py --from-ci-env

      - name: Compile Python sources
        run: python -m compileall -q agent_hub scripts

      - name: Validate config reference
        run: python scripts/check_config_reference.py

      - name: Validate config migration coverage
        run: python scripts/check_config_migration_coverage.py

      - name: Generate backend snapshot
        run: python scripts/generate_backend_snapshot.py

      - name: Validate backend snapshot drift
        run: python scripts/validate_backend_drift.py

      - name: Validate release manifest and version metadata
        run: python scripts/validate_release.py

      - name: Run Python unittest discovery
        run: python -m unittest discover -s tests

      - name: Check VS Code extension syntax
        working-directory: vscode-extension
        run: npm run check

      - name: Report stale package artifacts
        working-directory: vscode-extension
        run: npm run package-clean

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package

      - name: Validate VSIX cleanliness and source package artifacts
        run: python scripts/validate_vsix_cleanliness.py --check-source

      - name: Print release summary
        run: python scripts/release_summary.py

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-hub-vsix-${{ github.run_number }}
          path: vscode-extension/*.vsix
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $ErrorActionPreference = "Stop"
          $package = Get-Content vscode-extension/package.json | ConvertFrom-Json
          $version = [string]$package.version
          $tag = "v$version"
          $vsix = Get-ChildItem vscode-extension -Filter "*.vsix" | Select-Object -First 1
          if (-not $vsix) {
            throw "No VSIX package was generated."
          }

          python scripts/release_summary.py | Out-File -Encoding utf8 release-summary.md
          Add-Content -Encoding utf8 release-summary.md ""
          Add-Content -Encoding utf8 release-summary.md "## Installation"
          Add-Content -Encoding utf8 release-summary.md "Download ``$($vsix.Name)`` from this release and install it with VS Code's 'Install from VSIX...' command."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --force $tag $env:GITHUB_SHA
          git push --force origin "refs/tags/$tag"

          $releaseExists = $false
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }

          if ($releaseExists) {
            gh release edit $tag --title "Agent Hub $version" --notes-file release-summary.md --target $env:GITHUB_SHA
            if ($env:PRERELEASE -eq "true") {
              gh release edit $tag --prerelease
            } else {
              gh release edit $tag --latest
            }
            gh release upload $tag $vsix.FullName --clobber
          } else {
            $releaseArgs = @("release", "create", $tag, $vsix.FullName, "--title", "Agent Hub $version", "--notes-file", "release-summary.md", "--target", $env:GITHUB_SHA)
            if ($env:PRERELEASE -eq "true") {
              $releaseArgs += "--prerelease"
            } else {
              $releaseArgs += "--latest"
            }
            gh @releaseArgs
          }
