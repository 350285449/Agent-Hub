services:
  agent-hub:
    build: .
    image: agent-hub:local
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      AGENT_HUB_API_TOKEN: ${AGENT_HUB_API_TOKEN:?Set AGENT_HUB_API_TOKEN before starting public Docker}
      AGENT_HUB_TRUSTED_APPROVAL_TOKEN: ${AGENT_HUB_TRUSTED_APPROVAL_TOKEN:?Set AGENT_HUB_TRUSTED_APPROVAL_TOKEN before starting public Docker}
    volumes:
      - ./agent-hub.config.json:/config/agent-hub.config.json:ro
      - ./.agent-hub:/data/.agent-hub
      - ./:/workspace
    working_dir: /workspace
    command:
      - agent-hub
      - --config
      - /config/agent-hub.config.json
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "8787"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; request=urllib.request.Request('http://127.0.0.1:8787/health', headers={'Authorization':'Bearer '+os.environ['AGENT_HUB_API_TOKEN']}); urllib.request.urlopen(request, timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
