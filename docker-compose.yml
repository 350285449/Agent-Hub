services:
  agent-hub:
    build: .
    image: agent-hub:local
    ports:
      - "8787:8787"
    env_file:
      - .env
    volumes:
      - ./agent-hub.config.json:/config/agent-hub.config.json:ro
      - ./.agent-hub:/data/.agent-hub
      - ./:/workspace
    working_dir: /workspace
    command:
      - agent-hub
      - --config
      - /config/agent-hub.config.json
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "8787"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
